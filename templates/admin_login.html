<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTA Nest — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0f1e, #0a3d6b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .brand { color: #4da6ff; font-weight: 900; letter-spacing: 2px; }
        .btn-login {
            background-color: #1565c0;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 700;
            width: 100%;
        }
        .btn-login:hover { background-color: #0d47a1; color: white; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="brand">FUTA NEST</h2>
        <p class="text-muted mb-4">Admin Access Only</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label fw-semibold">Admin Password</label>
                <input type="password" name="password" class="form-control" 
                       placeholder="Enter admin password" required>
            </div>
            <button type="submit" class="btn-login btn mt-2">Login</button>
        </form>
    </div>
</body>
</html>
